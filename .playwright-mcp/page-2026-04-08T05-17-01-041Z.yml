          - heading "Question" [level=3] [ref=e4326]
          - paragraph [ref=e4327]: I would model this as a windowed aggregation problem. For each event, I extract the event minute and error code, then update a counter keyed by minute plus error code. When a window closes, I compute Top N for that minute with a min-heap over the aggregated counts. If logs can arrive late, I would use event time plus a watermark and allow a small lateness window. That way the result is stable but still tolerates reordering. In a distributed setting, Kafka plus Flink or Spark Structured Streaming would be a natural fit. To scale, I would partition by time bucket and possibly by error code, perform local aggregation, then merge partial counts before computing the final Top N. That reduces the amount of data shuffled across nodes. The main complexity is O(events) for counting plus O(m log N) per minute where m is the number of distinct error codes in that window. I would also define retention, output format, and what happens when a minute has too many unique codes.
          - heading "Reference answer" [level=3] [ref=e4328]
